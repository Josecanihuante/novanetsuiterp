name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Evita que se acumulen ejecuciones si haces varios pushes seguidos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # Especifica tu versión de pnpm si es necesario

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security Audit
        run: pnpm audit --audit-level=high
        continue-on-error: true # No detiene el CI por vulnerabilidades, pero te avisa

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Run Prisma migrations (test DB)
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: "file:./test.db"

      - name: Run unit and integration tests
        run: pnpm test
        env:
          DATABASE_URL: "file:./test.db"

      # --- PASOS NUEVOS AÑADIDOS ---

      - name: Build Project
        run: pnpm run build
        
      - name: Run Prisma migrations (dev DB for e2e)
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Seed database for e2e
        run: pnpm exec tsx prisma/seed.ts
        env:
          DATABASE_URL: "file:./dev.db"
      
      - name: Upload Test Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/ # Asegúrate de que tus tests generen esta carpeta
          retention-days: 5